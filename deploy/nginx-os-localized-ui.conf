# Localized OpenSprinkler UI (dglcinc fork) — LAN-only, plain HTTP on :8088.
#
# Served as plain HTTP (NOT through the 443 vhost) on purpose: the browser page
# and the OpenSprinkler controller (http://10.0.0.17:5000) must share an
# insecure origin, otherwise the controller's HTTP API calls are blocked as
# mixed content from an HTTPS page. Not exposed externally — only 80/443 are
# port-forwarded, and ufw only allows 8088 from the LAN (see deploy/install.sh).
#
# nginx serves straight from the repo's www/ tree, so updating the UI is just
# `git pull` on the Pi (no build/copy step — index.html loads the JS modules
# individually). Keep the repo at /home/pi/github/opensprinkler-localized-ui.
server {
    listen 8088;
    server_name _;

    root /home/pi/github/opensprinkler-localized-ui/www;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
